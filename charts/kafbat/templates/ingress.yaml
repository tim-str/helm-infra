apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kafbat
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: kafbat.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafbat-kafka-ui
                port:
                  number: 80